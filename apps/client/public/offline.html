<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iceman — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        background: #0f1117;
        color: #e2e4ea;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
      p { color: #9ca3af; font-size: 15px; line-height: 1.6; }
      .dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: #e55c3a; margin: 24px auto 16px;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="dot"></div>
      <h1>Iceman</h1>
      <p>You are offline.</p>
      <p>Your cached rights are still available.</p>
      <p style="margin-top: 16px; color: #5a5f70; font-size: 13px;">Return to the app to view them.</p>
    </div>
  </body>
</html>
